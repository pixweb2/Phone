<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدمات</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>خدمات</h1>
</header>

<div class="cards">

    <div class="card">
        <img src="icon/fix.png" alt="تعمیر موبایل" class="service-icon">
        <h2>تعمیر موبایل</h2>
        <p>تعمیر انواع گوشی‌های هوشمند</p>
        <a href="#" class="price-btn">استعلام قیمت</a>
    </div>

    <div class="card">
        <img src="icon/battery.png" alt="تعویض باتری" class="service-icon">
        <h2>تعویض باتری</h2>
        <p>تعویض باتری اصلی و باکیفیت</p>
        <a href="#" class="price-btn">استعلام قیمت</a>
    </div>

    <div class="card">
        <img src="icon/lcd.png" alt="تعویض LCD" class="service-icon">
        <h2>تعویض LCD</h2>
        <p>تعویض صفحه نمایش و تاچ</p>
        <a href="#" class="price-btn">استعلام قیمت</a>
    </div>

</div>

</html>
